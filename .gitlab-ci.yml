variables:
    RUNNER: "online-shop-runner-dev-shell"
    IMAGE_VERSION: "${CI_PROJECT_NAME}:${CI_COMMIT_TAG}_${CI_COMMIT_SHORT_SHA}"
    SNYKSCAN_REPORT: "snyk_scan_${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_report"
    TRIVYFS_REPORT: "trivy_fs_scan_${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_report"
    TRIVY_IMAGE_REPORT: "security_scan_image_${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_report"
    ARACHNI_WEBSITE_REPORT: "arachni_scan_website_${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_report"
    ZAP_WEBSITE_REPORT: "zap_scan_website_${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHORT_SHA}_report"

stages:
    - build
    - test source code
    - security scan image
    - deploy
    - security scan website
    - showlog

build:
    stage: build
    variables:
        GIT_STRATEGY: clone
    script:
        - docker build -t $IMAGE_VERSION .
        - docker images | grep $CI_PROJECT_NAME
    tags:
        - ${RUNNER}
    only:
        - tags

snyk_scan:
    stage: test source code
    variables:
        GIT_STRATEGY: none
    script:
        - echo "Building Snyk scanner..."
        - docker build --rm --network host --build-arg SNYK_AUTH_TOKEN=$SNYK_TOKEN --build-arg OUTPUT_FILENAME=$SNYKSCAN_REPORT -t $SNYKSCAN_REPORT -f Dockerfile-snyk .
        - docker create --name $SNYKSCAN_REPORT $SNYKSCAN_REPORT
        - docker cp $SNYKSCAN_REPORT:/app/$SNYKSCAN_REPORT.html .
        - docker rm $SNYKSCAN_REPORT
        - docker rmi $SNYKSCAN_REPORT
    tags:
        - ${RUNNER}
    only:
        - tags
    artifacts:
        paths: 
            - "$SNYKSCAN_REPORT.html"
        expire_in: 1 day

trivyfs_scan:
    stage: test source code
    variables:
        GIT_STRATEGY: clone
    script:
        - docker run --rm -v $PWD:/${CI_PROJECT_NAME} -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy fs /${CI_PROJECT_NAME} --severity HIGH,CRITICAL --format template --template "@contrib/html.tpl" --output /${CI_PROJECT_NAME}/$TRIVYFS_REPORT.html
        - sudo chown $(id -u):$(id -g) $TRIVYFS_REPORT.html
    tags:
        - ${RUNNER}
    only:
        - tags
    artifacts:
        paths: 
            - "$TRIVYFS_REPORT.html"
        expire_in: 1 day

trivy scan image:
    stage: security scan image
    variables:
        GIT_STRATEGY: none
    script:
        - docker run --rm -v $(pwd):/${CI_PROJECT_NAME} -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy clean --all
        - docker run --rm -v $(pwd):/${CI_PROJECT_NAME} -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image --format template --template "@contrib/html.tpl" --output /${CI_PROJECT_NAME}/${TRIVY_IMAGE_REPORT}.html $IMAGE_VERSION
    tags:
        - ${RUNNER}
    only:
        - tags
    artifacts:
        paths:
        - ${TRIVY_IMAGE_REPORT}.html
        expire_in: 1 day
        
deploy:
    stage: deploy
    variables:
        GIT_STRATEGY: none
    script:
        - docker stop $CI_PROJECT_NAME || true
        - docker rm $CI_PROJECT_NAME || true 
        - docker run --name $CI_PROJECT_NAME -dp $FE_PORT $IMAGE_VERSION
        - sleep 10
        - docker ps | grep $CI_PROJECT_NAME
    tags:
        - ${RUNNER}
    only:
        - tags

arachni_scan_website:
    stage: security scan website
    variables:
        GIT_STRATEGY: none
    script:
        - docker run --rm -v /tmp/:/tmp/ arachni/arachni:latest /usr/local/arachni/bin/arachni --output-verbose --scope-include-subdomains $URL_FE --report-save-path=/tmp/$ARACHNI_WEBSITE_REPORT.afr > /dev/null 2>&1
        - docker run --rm -v /tmp/:/tmp/ arachni/arachni:latest /usr/local/arachni/bin/arachni_reporter /tmp/$ARACHNI_WEBSITE_REPORT.afr --reporter=html:outfile=/tmp/$ARACHNI_WEBSITE_REPORT.html.zip
        - cp /tmp/$ARACHNI_WEBSITE_REPORT.html.zip .
    tags:
        - ${RUNNER}
    only:
        - tags
    artifacts:
        paths:
        - $ARACHNI_WEBSITE_REPORT.html.zip
        expire_in: 1 day

zap_scan_website:
    stage: security scan website
    variables:
        GIT_STRATEGY: clone
    script:
        - docker run --rm -u root -v $(pwd):/zap/wrk/:rw zaproxy/zap-stable zap-baseline.py -t $URL_FE -r $ZAP_WEBSITE_REPORT.html -I --autooff
        - sudo chown -R gitlab-runner. $ZAP_WEBSITE_REPORT.html
    tags:
        - ${RUNNER}
    only:
        - tags
    artifacts:
        paths:
        - $ZAP_WEBSITE_REPORT.html
        expire_in: 1 day

checklog:
    stage: showlog
    variables:
        GIT_STRATEGY: none
    script:
        - docker logs $CI_PROJECT_NAME --tail 50
    tags:
        - ${RUNNER}
    only:
        - tags